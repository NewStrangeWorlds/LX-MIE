name: Build and publish Python package

# Trigger on version tags (e.g. v1.0.0) or manually via the GitHub UI.
# The PyPI upload step runs on tag pushes and manual triggers.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # Build wheels for each platform
  # ---------------------------------------------------------------------------
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest   # Linux x86_64 (manylinux)
          - macos-13        # macOS x86_64 (Intel)
          - macos-14        # macOS arm64  (Apple Silicon)
          - windows-latest  # Windows x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/

  # ---------------------------------------------------------------------------
  # Build source distribution
  # ---------------------------------------------------------------------------
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: pip install build

      - run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ---------------------------------------------------------------------------
  # Upload to PyPI
  #
  # Requires a "pypi" environment configured in the repository settings and a
  # trusted publisher set up on PyPI (https://pypi.org/manage/account/publishing/)
  # with the workflow filename "build_and_publish.yml".
  # No API token is needed — authentication uses OIDC.
  # ---------------------------------------------------------------------------
  upload_to_pypi:
    name: Upload to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
